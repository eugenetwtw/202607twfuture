"caption": "2019-10-20。後で写真を見返すと、選挙全期間で蔡宜芳との唯一の二人写真がこれ。宜芳は必死に戦っていた。張益贍とも会い、テスラで二人を宜芳の高雄の実家へ送った——父親と話すと言うので。後に二人の噂が立った。政治活動は楽ではない。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image28.jpg", "clip": "../../media/clips/img-image28.mp4", "kind": "clip"}, {"src": "../../media/image1.jpg", "caption": "2019-10-20。後のマーケでよく使った写真。うまく撮れていて若く見える。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image1.jpg", "clip": "../../media/clips/img-image1.mp4", "kind": "clip"}, {"src": "../../media/image174.jpg", "caption": "2019-10-20。撮影後、台中の別候補側の人がプラカードでうっかり風船を刺した。選挙ではあらゆる人が見える。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image174.jpg", "clip": "../../media/clips/img-image174.mp4", "kind": "clip"}, {"src": "../../media/image38.jpg", "caption": "2019-10-20。午前の指名後、柯は台南でサイン会、私もテスラで追随し、新営・顔耀星の選挙区の廟にも寄った。台北は台南のこの区に多く資源を注いだが票は振るわず——区内の他者が強かったのかもしれない。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image38.jpg", "clip": "../../media/clips/img-image38.mp4", "kind": "clip"}, {"src": "../../media/image12.jpg", "caption": "2019-10-20。烏日で柯市長と。日曜朝、高雄→台南市→新営→下営。充電の暇がなく奇美のスーパーチャージャーにも寄れず、帰路に嘉義で充電。\n\n全島にスーパーチャージャーが二つしかない頃に一日環島できた人間だが、環島に市場回りは要らない！街宣は本当に疲れる。充電中に600元でシャワー休憩、30分で家路へ。\n\n建設で劣悪な労働は見過ぎ・やり過ぎ——トンネル、炎天下の鉄筋、下水の悪臭。それでも政治家の労働条件は見た中で最悪だ！", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image12.jpg", "clip": "../../media/clips/img-image12.mp4", "kind": "clip"}, {"src": "../../media/image30.jpg", "caption": "2019-10-22（火）。高雄指名の直後、台中の別候補を連れて王社長を訪問。木造住宅の仕事は政策理解と一致し、別候補に無料の選対本部も提供。左から若い社長、私、大雅候補の張睿倉。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image30.jpg", "clip": "../../media/clips/img-image30.mp4", "kind": "clip"}, {"src": "../../media/image65.jpg", "caption": "2019-10-23（水）。長年連絡のなかった中学同学と再会。当時は運動神経抜群の「不良」、今は大安渓以南で最も高い地位の保険マネージャー——ホワイトカラーの中のホワイトカラー。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image65.jpg", "clip": "../../media/clips/img-image65.mp4", "kind": "clip"}, {"src": "../../media/image144.jpg", "caption": "2019-10-23。選挙にスマホなど大量のテックを導入。4年ものの旧機はデータ量に耐えず、四五台試して選挙用に。最後は中国製ファーウェイ——必要なのはライカレンズ。このGoogle Pixel XLは残さず、サムスンとアップルも試したが、負荷がこれほど重い選挙で使える機は少ない。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image144.jpg", "clip": "../../media/clips/img-image144.mp4", "kind": "clip"}, {"src": "../../media/image135.jpg", "caption": "2019-10-24（木）。選挙のリズムは速い。数日前に指名されたばかりでイメージ撮影。民衆党提携の広告会社が内湖のスタジオで撮影。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image135.jpg", "clip": "../../media/clips/img-image135.mp4", "kind": "clip"}, {"src": "../../media/image141.jpg", "caption": "2019-10-24。選挙は私には馴染みのない活動。一戦しての結論：政治は演芸・娯楽——そして何かをやり遂げる能力が少しは要る集合体だ。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image141.jpg", "clip": "../../media/clips/img-image141.mp4", "kind": "clip"}, {"src": "../../media/image19.jpg", "caption": "どれが好きですか。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image19.jpg", "clip": "../../media/clips/img-image19.mp4", "kind": "clip"}, {"src": "../../media/image134.jpg", "caption": "前回これをしたのは結婚のとき。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image134.jpg", "clip": "../../media/clips/img-image134.mp4", "kind": "clip"}, {"src": "../../media/image106.jpg", "caption": "ミラン・クンデラは『存在の耐えられない軽さ』で政治家の写真の印象を書いた——小説家であり政治犯でもあった。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image106.jpg", "clip": "../../media/clips/img-image106.mp4", "kind": "clip"}, {"src": "../../media/image61.jpg", "caption": "2019-10-27（日）。選挙では大量の人と写真を撮る。郭台銘本人は写真より若い。この時代の縮図だ。前の時代の台湾首富は王永慶、この時代は彼——中国の台頭に乗った。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image61.jpg", "clip": "../../media/clips/img-image61.mp4", "kind": "clip"}, {"src": "../../media/image127.jpg", "caption": "2019-10-27。郭台銘は2020年選挙前に国民党の総統指名を求め、後に撤退。一連の感謝ツアーを行い、一時我々と提携し共同写真を招いた。イベントは成功し、若い夫人は元ダンス教師で、連れてきた舞踊団の水準は極めて高い。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image127.jpg", "clip": "../../media/clips/img-image127.mp4", "kind": "clip"}, {"src": "../../media/image90.jpg", "caption": "2019-10-30（水）。指名から10日、民衆党から来た資源は実質このベストだけ。選対と自宅は民進党候補の本部、そして総統の台中本部近く（背景）。一票の限界費用は民進党候補の三分の一〜五分の一。経済学的には「私に投票すべきでない」——使いすぎない、CPが低すぎる、と。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image90.jpg", "clip": "../../media/clips/img-image90.mp4", "kind": "clip"}, {"src": "../../media/image50.jpg", "caption": "2019-10-31（木）。近隣のビジネスセンターを比較し、国家商貿センター内を選対に。最初の選対主任は洪さん、元は当社の会計。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image50.jpg", "clip": "../../media/clips/img-image50.mp4", "kind": "clip"}, {"src": "../../media/image118.jpg", "caption": "2019-11-02（土）。選挙支出、立法委員の給与、国民所得——米国議員との比較。\n\n民衆党学校はミンチ機を恐れ特訓を入れた。里長選は30〜50万、議員は300〜500万、立法委員は約3000万と講師は言う。政治献金法後はデータがある。GDPと所得でスケールすると米上院は約3000万ドル級（100人）——人口約15倍、所得約2.5倍でも台湾の選挙支出はなお3割ほど高い。\n\n米下院給与約17万ドル、台湾約7万。台湾×2.5で比べると立法委員の給与は相対的に高く見える……出たい人が多いのも道理。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image118.jpg", "clip": "../../media/clips/img-image118.mp4", "kind": "clip"}, {"src": "../../media/image48.jpg", "caption": "2019-11-07（木）。選挙中、有権者をしばしば叱った——彼らも大変だ。激しい選挙の結果は良かった。2020-01-11に民進党が大勝、蔡英文は約800万票の史上新高。COVIDで世界が荒れ台湾が相対的に安全だったことを思えば、台湾人はよい政治選択をした。有権者は傑出しうるし、傑出した。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image48.jpg", "clip": "../../media/clips/img-image48.mp4", "kind": "clip"}, {"src": "../../media/image5.jpg", "caption": "2019-11-12（火）。「選戦」と呼ぶからには戦争がある。理念の人も、罵りに来る人もシステムに入る。だが対象を間違えたと思う——最初から最後まで、私は彼らの脅威ではなかった。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image5.jpg", "clip": "../../media/clips/img-image5.mp4", "kind": "clip"}, {"src": "../../media/image47.jpg", "caption": "2019-11-13（水）。選挙で子どもの写真を多く使った。もう大きく、写真はほぼ10年前。子どもはやはり可愛い。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image47.jpg", "clip": "../../media/clips/img-image47.mp4", "kind": "clip"}, {"src": "../../media/image143.jpg", "caption": "2019-11-14（木）。台中市選委会で正式に「領表」し、2020立法委員への登記準備。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image143.jpg", "clip": "../../media/clips/img-image143.mp4", "kind": "clip"}, {"src": "../../media/image83.jpg", "caption": "2019-11-15（金）。党部で台中潭雅神后の候補・里長張睿倉と。彼はいつも180と自慢し、私は185で五つ上。世新新聞卒で、里長＝老人の印象を破る。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image83.jpg", "clip": "../../media/clips/img-image83.mp4", "kind": "clip"}, {"src": "../../media/image89.jpg", "caption": "2019-11-15（金）。逢甲大学土地管理系の陳建元教授を訪問。\n\n同い年だが経歴は豊か。英国留学後、逢甲で教え、ブロックチェーン土地登記に独自の見解。容積移転のブロックチェーンも議論。床面積供給の増加は価格抑制に有利だと彼も考え、私の見方は多く確認された。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image89.jpg", "clip": "../../media/clips/img-image89.mp4", "kind": "clip"}, {"src": "../../media/image104.jpg", "caption": "2019-11-18（月）。台中市選委会で2020・台中第四選挙区（西屯南屯）に正式登記。台中州庁の中山堂——よく会議をした場所で、会議以外は初めて。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image104.jpg", "clip": "../../media/clips/img-image104.mp4", "kind": "clip"}, {"src": "../../media/image100.jpg", "caption": "2019-11-18。登記前後も郭董とある程度協力。肖像使用を拒まれた話は聞いていない。開票結果から見ると、彼の心配はあまり影響しなかった。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image100.jpg", "clip": "../../media/clips/img-image100.mp4", "kind": "clip"}, {"src": "../../media/image102.jpg", "caption": "2019-11-18。民衆党文宣主任の熊熊は米国の博士で、マーケを重く支えた。台中三区で私の事務所が高鐵に最も近く、何週間も夜に台中候補がここでライブ。終了後テスラで送り——運転技術に皆戦慄したとか…", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image102.jpg", "clip": "../../media/clips/img-image102.mp4", "kind": "clip"}, {"src": "../../media/image70.jpg", "caption": "2019-11-18。民衆党文宣主任の熊熊は米国の博士で、マーケを重く支えた。台中三区で私の事務所が高鐵に最も近く、何週間も夜に台中候補がここでライブ。終了後テスラで送り——運転技術に皆戦慄したとか…", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image70.jpg", "clip": "../../media/clips/img-image70.mp4", "kind": "clip"}, {"src": "../../media/image166.jpg", "caption": "2019-11-19（火）。小牛が夜に台北から車で来てライブに付き合ってくれた——本物のネット有名人。柯昱安はYouTube「木火4超玩」の「一日市長幕僚 feat.柯文哲」を企画し爆紅、視聴は千万回級、「学姐」「小牛」を押し上げた。最近は街で指差されない（それは良い）。柯のシステムは若者が多く、私には問題にも見える。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image166.jpg", "clip": "../../media/clips/img-image166.mp4", "kind": "clip"}, {"src": "../../media/image26.jpg", "caption": "2019-11-21（木）。選挙ではメディアとも密に接触する。メディアも素材としてあなたを必要とする。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image26.jpg", "clip": "../../media/clips/img-image26.mp4", "kind": "clip"}, {"src": "../../media/image20.jpg", "caption": "2019-11-21（木）。党部で柯文哲市長・主席とともに財訊の取材。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image20.jpg", "clip": "../../media/clips/img-image20.mp4", "kind": "clip"}, {"src": "../../media/image107.jpg", "caption": "2019年11月。なぜ選対に巡回簿？およそ三時間ごとに警察がサインに来た。\n\n選罷法§30 I：登記締切後〜投票日前に区域立法委員や市長候補が死亡すれば、選委会は当該選挙を停止し再選挙を定期する。\n\n私の区は9人。一人で止まれば全区停止——だから交番は私を気にした。選挙は妊婦に似る…無事でも流産でも、産後の施設が要る。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image107.jpg", "clip": "../../media/clips/img-image107.mp4", "kind": "clip"}, {"src": "../../media/image114.jpg", "caption": "2019-11-22（金）。無給のボランティア執行長・林欣徳と楊寶楨。欣徳は4〜5歳下だが同じく海兵隊で気が合う。私のやりたくないこと（長い風船担ぎ）をやる。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image114.jpg", "clip": "../../media/clips/img-image114.mp4", "kind": "clip"}, {"src": "../../media/image131.jpg", "caption": "2019-11-25（月）。民衆党番組『衆議院』でPTTの管理を考えるべきだと述べた。12月初放映後、大量のネット軍がファンページを攻撃——観察と学びが多かった。後に「カード神」が日本駐在使節への攻撃指揮疑惑の末に自殺した。青か緑か分からぬネット軍を間近で体験し、ネットいじめで自殺する人に同情する。体験なしに「強いはず」「自殺は愚か」と語るな。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image131.jpg", "clip": "../../media/clips/img-image131.mp4", "kind": "clip"}, {"src": "../../media/image87.jpg", "caption": "2019-11-25。収録後、「宅神」朱学恒と写真。全く知らなかったが、ウィキでは『指輪物語』翻訳で有名になりインフルエンサーに。インフルエンサーの道はきつい。業界には家賃だけ取る富裕層もいる（不労所得とは限らず、資本と勘がある）。インフルエンサーは毎日複数紙を読み社会の脈を追い続けねばならない——かなりきつい。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image87.jpg", "clip": "../../media/clips/img-image87.mp4", "kind": "clip"}, {"src": "../../media/image146.jpg", "caption": "2019-11-26（火）。テックで選挙。自分でドローンを飛ばし空に「張渝江、大気汚染に抗う」と書いた。選挙費用が少なすぎるのは市場にとって良い現象ではない。自分でやり過ぎると産業の機会を奪う。ドローンでは小学校同学のボランティア（編集）にも頼ったが、彼女は私を神秘視し、結局うまく飛ばせなかった…", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image146.jpg", "clip": "../../media/clips/img-image146.mp4", "kind": "clip"}, {"src": "../../media/image82.jpg", "caption": "2019-11-28（木）。快樂聯播網で厳さんのインタビュー。熱い支持者で、ずっとイケメンと言う。三立ドラマ『炮仔聲』の「渣男」「天宇」に似ているとも——天宇がどんな人物か結局よく分からなかった。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image82.jpg", "clip": "../../media/clips/img-image82.mp4", "kind": "clip"}, {"src": "../../media/image15.jpg", "caption": "2019-11-30（土）。台北で郭董支援の候補・市府と関わる李縉穎（元国民党、無所属）の決起に参加。台湾の有名人をあまり知らず、美しい女性をしばらく見てから于美人だと分かった——当時親民党スポークス。その日宋楚瑜、郭台銘、柯文哲が同台、私も壇上に。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image15.jpg", "clip": "../../media/clips/img-image15.mp4", "kind": "clip"}, {"src": "../../media/image163.jpg", "caption": "2019-12-01（日）。民衆党にはスターが多い。知名度の高い美人も。学姐と呼ばれる彼女は90後（1992）、輔大と英国の華やかなメディア修士だが皆は「学姐」しか知らない。二十歳も上だと分からなかったと言う。ありがとう学姐！", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image163.jpg", "clip": "../../media/clips/img-image163.mp4", "kind": "clip"}, {"src": "../../media/image92.jpg", "caption": "2019-12-04（水）。投票一か月前、ボランティアが徐々に他作業も。このポスターはボランティア「二刀」の妻がデザイン。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image92.jpg", "clip": "../../media/clips/img-image92.mp4", "kind": "clip"}, {"src": "../../media/image68.jpg", "caption": "2019-12-06（金）。投票一か月前から市場回りを開始。大隆路の夕方市場——土地はかつて台中有名な酒店・金銭豹の跡。\n\n小学校同学（国立大文学修士、骨董装身具）が数十回市場を同行。仕出し世家で主婦としても有能で、市場の歩き方を教えた。市場は好き。看板に数十万払うくらいなら市場で食材を買いボランティアに飯を出す。費用はあるが思い出と良い結果に換わり、経済的にも看板地主から他者へ金が流れる。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image68.jpg", "clip": "../../media/clips/img-image68.mp4", "kind": "clip"}, {"src": "../../media/image113.jpg", "caption": "2019-12-07（土）。黎明新村の小康公有市場。住民減で他小売に勝てず、店賃は安いが商売は閑散。市場の財務は再考の余地——産出は低いが実直で質は良い。それでも露店はきつい仕事。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image113.jpg", "clip": "../../media/clips/img-image113.mp4", "kind": "clip"}, {"src": "../../media/image110.jpg", "caption": "2019-12-07。水湳の経貿園区で選挙短編を撮影。台北の映像班はドローンが飛べず、自分で自分を空撮。自分の選挙短編を自分で空撮した唯一の候補かもしれない。後で一番テック感が良いと言われた——当然、自分のドローンがあるのは私だけ。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image110.jpg", "clip": "../../media/clips/img-image110.mp4", "kind": "clip"}, {"src": "../../media/image67.jpg", "caption": "（二次元コードで書中の動画へ）", "youtube_id": "XnePad56vI0", "link": "https://youtu.be/XnePad56vI0", "link_type": "youtube", "poster": "../../media/image67.jpg", "clip": "", "kind": "youtube"}, {"src": "../../media/image125.jpg", "caption": "2019-12-08（日）。最終月、市場掃街を大量実施。日曜朝の人混み水湳市場。右から選対執行長ブルース、写真ボランティア孟哲、当時の台中後援会執行長洪祺祥、副執行長董柏醇、美しい張さん（母親支持者）。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image125.jpg", "clip": "../../media/clips/img-image125.mp4", "kind": "clip"}, {"src": "../../media/image74.jpg", "caption": "2019-12-08。テスラで林珍羽（右）と学姐・黄瀞瑩（中）を送る。車にはしばしば著名人が乗る。珍羽は司会・演説が一人前で、私的には誠実（政治の場で私的に誠実な人は少ない）。2020年COVIDは経済だけでなく民衆党など小党も周縁化。彼女はマスクが買えないとFBで書き群攻された——ネットの群は感性的で言論の自由は薄い。小党の不安は理解できる。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image74.jpg", "clip": "../../media/clips/img-image74.mp4", "kind": "clip"}, {"src": "../../media/image13.jpg", "caption": "2019-12-10（火）。生粋の台中人——小学、向上国中、台中一中、その後台北の台大。高鐵案件と家族で台中に戻り、台北で学び働いた10年を離れたが、逢甲夜市は行ったことがなかった。選挙は人生で最も市場と夜市が密集した時期。右は当時の民衆党台中スポークス・楊寶楨。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image13.jpg", "clip": "../../media/clips/img-image13.mp4", "kind": "clip"}, {"src": "../../media/image159.jpg", "caption": "2019-12-13（金）。ティッシュ約3万包。経済性ではティッシュは今も良いマーケ。良い物は1元強、安い物は0.7元——安い方を刷った。間に合わないときは執行長と床に伏せて手貼り。結論は印刷屋に頼むこと。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image159.jpg", "clip": "../../media/clips/img-image159.mp4", "kind": "clip"}, {"src": "../../media/image16.jpg", "caption": "2019-12-14（土）。忙しくても協会行事ではいつも挨拶。もっと専門家が選挙に出るきっかけになれば——出るだけで非専門家を薄められる。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image16.jpg", "clip": "../../media/clips/img-image16.mp4", "kind": "clip"}, {"src": "../../media/image62.jpg", "caption": "2019-12-14。最終月、市場と夜市で火の手。あまりに多くのオフラインは体力を削り、専門家に「割に合わない」と思わせ、政治家の専門性を下げる。2020年COVIDで私の時代が来た。夜市で票が取れなければ、風船なしの新しい方法で票を掘れ。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image62.jpg", "clip": "../../media/clips/img-image62.mp4", "kind": "clip"}, {"src": "../../media/image36.jpg", "caption": "2019-12-14。逢甲夜市でボランティアと集合し掃街。多くは無償ボランティアに支えられた——本当に助かった。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image36.jpg", "clip": "../../media/clips/img-image36.mp4", "kind": "clip"}, {"src": "../../media/image79.jpg", "caption": "2019-12-14。夜市はめったに行かない。この時期が人生で最も夜市に行った頻度。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image79.jpg", "clip": "../../media/clips/img-image79.mp4", "kind": "clip"}, {"src": "../../media/image45.jpg", "caption": "2019-12-16（月）。オフライン活動はいろいろあるが、最も反対なのはゴミ収集車の追跡。なぜするか。ゴミ出しに来る多くはそこに戸籍があり、一次の票源に触れる。しかし収集車を自ら追うとき、どんな政策の高さと理念を示すのか。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image45.jpg", "clip": "../../media/clips/img-image45.mp4", "kind": "clip"}, {"src": "../../media/image88.jpg", "caption": "2019-12。Costcoは私の選挙区。そこで食事もした。「動く人形看板」も効果があると思う。2020年COVIDでCostcoは食事席を撤去——これが最後（？）の姿。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image88.jpg", "clip": "../../media/clips/img-image88.mp4", "kind": "clip"}, {"src": "../../media/image72.jpg", "caption": "2019-12。Costcoは私の選挙区。そこで食事もした。「動く人形看板」も効果があると思う。2020年COVIDでCostcoは食事席を撤去——これが最後（？）の姿。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image72.jpg", "clip": "../../media/clips/img-image72.mp4", "kind": "clip"}, {"src": "../../media/image97.jpg", "caption": "2019-12-16。選挙は昔の知人ともつなぐ。中学同学の多くは成功した。陳医師は向上国中の同学で有名な中医、西部大都市に連鎖医院。国中では不良、私は資優——結果、不良は医者、資優は市場で生計。彼は本も多く書き、選対に太っ腹に寄付。その金で台中の大気汚染に抗った。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image97.jpg", "clip": "../../media/clips/img-image97.mp4", "kind": "clip"}, {"src": "../../media/image58.jpg", "caption": "2019-12-16。選挙は昔の知人ともつなぐ。中学同学の多くは成功した。陳医師は向上国中の同学。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image58.jpg", "clip": "../../media/clips/img-image58.mp4", "kind": "clip"}, {"src": "../../media/image165.jpg", "caption": "2019-12-17（火）。選挙区には市場や花市が多く、当時Costcoもこの区。台中花卉市場とは以前から工事鑑定の縁。都会台中で花市がある生活は安く美しい——が普段はあまり行かず、選挙が人生最大密度の花市期間。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image165.jpg", "clip": "../../media/clips/img-image165.mp4", "kind": "clip"}, {"src": "../../media/image149.jpg", "caption": "2019-12-17（火）。選挙区には市場や花市が多く、当時Costcoもこの区。台中花卉市場とは以前から工事鑑定の縁。都会台中で花市がある生活は安く美しい——が普段はあまり行かず、選挙が人生最大密度の花市期間。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image149.jpg", "clip": "../../media/clips/img-image149.mp4", "kind": "clip"}, {"src": "../../media/image11.jpg", "caption": "2019-12-18（水）。区人口約40万、有権者（20歳超）約30万——当選にはおよそ10万票級。多くは数年単位で「超前部署」。選委会は落ち着き、抽選で候補番号が決まるのは投票2〜3週前。公報と投票用紙に印刷される番号抽選自体がマーケ戦場。経験がなく、記者に親切に「奇装する人もいる」と教えられた。土木技師として安全ヘルメットで技師と公会をPR。番号は5。党部との調整はぎこちなく（人に迷惑をかけたくない）、応援登壇者を集めるのも難しく、知名度の高い人と写真を撮る機会にもした。左は学姐・黄瀞瑩。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image11.jpg", "clip": "../../media/clips/img-image11.mp4", "kind": "clip"}, {"src": "../../media/image57.jpg", "caption": "2019-12-18。番号抽選の日、北部から柯の母と学姐・黄瀞瑩が来た。柯にこんな母がいるのが羨ましい。アスペルガーはもう一方の遺伝かもと言う人もいるが、柯の成就の多くは母の手による。なぜ出馬したか。手伝うためだ。指名自体が難しく、短期間で勝つのはさらに難しい——勝つ以外の目的がなければ義無反顧に助けにくい。理念は発表したかった。民衆党が指名しなくても無所属で出るつもりだったが、無所属は献金の税控除問題がある。短時間で多くの人を指名し後始末なしは難しい：台北のある女性と党連絡員の感情もその例。台中は3候補。上図で4を出すのは大雅の里長・張睿倉——ゴミ車を追い洪慈庸の夫まで引きずり込み、後に落選の責任をネット軍に追及された。右上は北北区の謝文卿、選後に大里の里長を巧虎人形とポップコーン機の横領で訴え、ライオンズの会長罷免と公金流用疑惑とも言われる。短時間で当選級の人を指名するのは難しく、当選目的でなく命懸けで動く人も得難い。2020年、区域の民衆党指名18人は全員落選——だが価値はあった。私の区だけで政党補助金少なくとも660万の価値を返した。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image57.jpg", "clip": "../../media/clips/img-image57.mp4", "kind": "clip"}, {"src": "../../media/image21.jpg", "caption": "2019-12-18。創設直後の党は何もかも難しい。各行事のライブは音が悪く、私は無線マイクを買い効果を実感。文宣主任の米国博士・熊熊と親しく、彼の動画を「盗用」しがちなので、自分が気に入ったセットを党に寄付。ガジェット好きへ：メガホンにもつなげ、教育や行事に便利。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image21.jpg", "clip": "../../media/clips/img-image21.mp4", "kind": "clip"}, {"src": "../../media/image98.jpg", "caption": "2019-12-21（土）。台中の別区候補の「千人入党」会食で、後に会場から「退場要請」。政治素人で文化を知らず、柯が「彼らの主催」に来る場に私がいてはならないと思われた。短時間で人を集め統合するのは挑戦。左は「保姆システム」の保姆・董德堉（ひまわり世代、蔡宜芳事件後に弱点が露呈——私は知っていた。私の区にはそんな保姆はいなかった）。後に他者と噂（双方独身とも）。左から二人目は北北区候補、後にライオンズ会員から公金流用で訴えられ会長罷免決議など——詳細は十分知らない。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image98.jpg", "clip": "../../media/clips/img-image98.mp4", "kind": "clip"}, {"src": "../../media/image167.jpg", "caption": "2019-12-21。車を宣伝車にし、監察院に選挙支出として申告すべきと言った——さもなくば他人が身代を選挙に出す理由がない。却下された。時間投入を含めれば申告額は真のコストではない。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image167.jpg", "clip": "../../media/clips/img-image167.mp4", "kind": "clip"}, {"src": "../../media/image40.jpg", "caption": "2019-12-22（日）。民進党候補・張廖万堅が区内で行事、有名なのは紙風車劇団。長年の選挙プロは手慣れている。日曜夜7時以降、来るのは多く区内住民。来場＝投票ではないが内容は良い。現場で少し記録（ライブリンク）。印象は卵で石を打つ。学歴能力の差というより、時間・資源・技巧の蓄積の差だ。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image40.jpg", "clip": "../../media/clips/img-image40.mp4", "kind": "clip"}, {"src": "../../media/ima のは笑止（笑ってくれ、自分でも荒谬だと思う。短時間で何ができる？）。それでも何千回嘲られ罵られてもやる。現状は我々が選んだ人が結果を負う？\n\n結論：中部の大気は青緑の悪闘の下、きれいな日は永遠に来ない。空気清浄機を買え——外気で公立学校に通う子は？私の子もこの空気で授業を受け、我々もこの空気で生きる。\n\nどうすればいいか分からない…私学に行けない子は多い…子どもは病む…有権者が最大の責任を負うが、我々がダメな有権者かもしれないと気づいていない。\n\n卑しく頼むしかない。誰に入れてもいい、真剣に考えてから入れて。空気を良くする人を見捨てないで。それが最も重要！！\n\n#FBリンク", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image8.jpg", "clip": "../../media/clips/img-image8.mp4", "kind": "clip"}, {"src": "../../media/image155.jpg", "caption": "2020-01-07（火）。投票4日前。家と選対近くのModel沐蘭（かつて台中最高級Model、今は古い）で開票の夜の会場を見た。背が高くプレイボーイに見えるが、モーテルの記憶は921のとき家族が泊まったことだけ。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image155.jpg", "clip": "../../media/clips/img-image155.mp4", "kind": "clip"}, {"src": "../../media/image55.jpg", "caption": "2020-01-08（水）。最終週、無給の執行長が自車自費で小さな拡声器を車に縛り宣伝車に。後から見れば収穫は友情と、武漢で年越しせずに済んだこと——留まったら台湾に戻れなかった。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image55.jpg", "clip": "../../media/clips/img-image55.mp4", "kind": "clip"}, {"src": "../../media/image81.jpg", "caption": "2020-01-10（金）。早朝、水湳市場で掃街とティッシュ。後で台北の選前決起のため北上を送り、中部の柯支持は台北に劣らない。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image81.jpg", "clip": "../../media/clips/img-image81.mp4", "kind": "clip"}, {"src": "../../media/image150.jpg", "caption": "2020-01-10（金）。台北駅。左は桃園の陳泓維——誠実な若者で政治世家、多くを学んだ。右は寶楨。その日の私はミッキー。壇上に人が多いとき、フレームを取るには戦略が要る。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image150.jpg", "clip": "../../media/clips/img-image150.mp4", "kind": "clip"}, {"src": "../../media/image52.jpg", "caption": "2020-01-10（金）。台北の最終選前決起で初めて柯の有名な夫人・陳佩琪医師に会った。魅力的。柯の鍵となる助け手は女性だと言われる——母、妻、同僚（蔡壁如）。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image52.jpg", "clip": "../../media/clips/img-image52.mp4", "kind": "clip"}, {"src": "../../media/image77.jpg", "caption": "2020-01-09（木）。台北の選前決起。学び働き十数年の台北。場所はかつての台汽西站——異郷の遊子の帰郷入口。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image77.jpg", "clip": "../../media/clips/img-image77.mp4", "kind": "clip"}, {"src": "../../media/image91.jpg", "caption": "2020-01-11（土）。投票日。編集ボランティアに同行してもらい投票。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image91.jpg", "clip": "../../media/clips/img-image91.mp4", "kind": "clip"}, {"src": "../../media/image162.jpg", "caption": "2020-01-11（土）。夜、台中のモーテル「沐蘭」で開票の夜。向かいは張廖万堅の本部。彼らは夜7時に花火を上げ当選宣言。天時地利人も揃っていた。我々はビールと歌、ボランティアに礼を言い真夜中近くに退席、彼らは朝3時まで歌った。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image162.jpg", "clip": "../../media/clips/img-image162.mp4", "kind": "clip"}, {"src": "../../media/image94.jpg", "caption": "2020-01-11 最終結果、私は3位。下と約1万、上と約8万票差。台湾の開票は極めて効率的で、七八時にはおおよそ出る。結果分析の動画も作った。2019-10-20指名から2020-01-11まで約80日で約1万4千票。地域基盤なしでこの短時間。敗れても誇り。台湾の民主とボランティアと皆に感謝。これが我々の勝利。\n\n#YouTubeリンク", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image94.jpg", "clip": "../../media/clips/img-image94.mp4", "kind": "clip"}, {"src": "../../media/image43.jpg", "caption": "2020-01-12（日）。選後の戦場片付け。1万4千票のための「唯一」の帆布看板、6000元、隣人バルコニー提供——友情は無償で無価。", "youtube_id": "JMnpM0G7FaY", "link": "https://www.youtube.com/watch?v=JMnpM0G7FaY", "link_type": "youtube", "poster": "../../media/image43.jpg", "clip": "", "kind": "youtube"}, {"src": "../../media/image177.jpg", "caption": "2020-01-12（日）。選後の戦場片付け。1万4千票のための「唯一」の帆布看板、6000元、隣人バルコニー提供——友情は無償で無価。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image177.jpg", "clip": "../../media/clips/img-image177.mp4", "kind": "clip"}, {"src": "../../media/image123.jpg", "caption": "2020-01-14（火）。区内のお礼放送のほか、執行長と編集とEVで一日環島お礼。民衆党の全国政党票約160万は四年で約3億2千万——がんばれ。区域候補一人50万（保証金20万込みで人件費と家賃で消える）。支出約6000万、募金約9000万で約3000万余り、政党票と合わせ四年で約3億5千万。ステッカー付きテスラで花蓮清水断崖を越えた。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image123.jpg", "clip": "../../media/clips/img-image123.mp4", "kind": "clip"}, {"src": "../../media/image25.jpg", "caption": "2020-01-14（火）。EV環島お礼で台東のガジュマル下のビーフン店へ。店主は民衆党支持、台中から台東で30年超。余天の「ガジュマルの下」が店名の由来。古木のそば。二代目が大きな店と新メニューに。安くて美味しいビーフンだが、多くは追加して高くなる。人生まれに来るのだから食べよう！", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image25.jpg", "clip": "../../media/clips/img-image25.mp4", "kind": "clip"}, {"src": "../../media/image39.jpg", "caption": "2020-01-14（火）。EV環島で太麻里へ。釈迦頭で有名な区。ここにも民衆党候補・陳允萍がいたが星を戴き月を急ぎあまり留まらず（後で叱られた——次回は止まる…）。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image39.jpg", "clip": "../../media/clips/img-image39.mp4", "kind": "clip"}, {"src": "../../media/image130.jpg", "caption": "2020-01-15（水）未明。区内お礼とEV環島の後、家から百里の嘉義スーパーチャージャー。台中の家に2時着。お礼を終え、人生初の政治活動を終えた。収穫たっぷりの敗戦——それが誇り。指名、選挙、ネット軍に編集が倒れ、生き延びて掃街から開票お礼まで。80日1万4千票。私の提案はいずれ実現する。遠隔の授業・仕事・医療は2020年COVIDで直ちに政策の高さを示した。洞察を証明し続ける。ありがとう。", "youtube_id": "", "link": "", "link_type": "", "poster": "../../media/image130.jpg", "clip": "../../media/clips/img-image130.mp4", "kind": "clip"}]</script>
